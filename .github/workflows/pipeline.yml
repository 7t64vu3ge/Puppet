name: Deploy to AWS ECS

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-ecs-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
  ECS_EXECUTION_ROLE_ARN: ${{ vars.ECS_EXECUTION_ROLE_ARN }}
  ECS_BACKEND_SERVICE: ${{ vars.ECS_BACKEND_SERVICE }}
  ECS_FRONTEND_SERVICE: ${{ vars.ECS_FRONTEND_SERVICE }}
  ECR_BACKEND_REPOSITORY: ${{ vars.ECR_BACKEND_REPOSITORY }}
  ECR_FRONTEND_REPOSITORY: ${{ vars.ECR_FRONTEND_REPOSITORY }}
  BACKEND_FRONTEND_URL: ${{ vars.BACKEND_FRONTEND_URL }}
  BACKEND_CORS_ORIGINS: ${{ vars.BACKEND_CORS_ORIGINS }}
  BACKEND_GOOGLE_CALLBACK_URL: ${{ vars.BACKEND_GOOGLE_CALLBACK_URL }}
  BACKEND_MONGO_URI_ARN: ${{ vars.BACKEND_MONGO_URI_ARN }}
  BACKEND_JWT_SECRET_ARN: ${{ vars.BACKEND_JWT_SECRET_ARN }}
  BACKEND_GOOGLE_CLIENT_ID_ARN: ${{ vars.BACKEND_GOOGLE_CLIENT_ID_ARN }}
  BACKEND_GOOGLE_CLIENT_SECRET_ARN: ${{ vars.BACKEND_GOOGLE_CLIENT_SECRET_ARN }}

jobs:
  deploy:
    name: Build, Push, and Deploy
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Validate deployment configuration
        shell: bash
        run: |
          required_vars=(
            AWS_REGION
            AWS_ROLE_TO_ASSUME
            ECS_CLUSTER
            ECS_EXECUTION_ROLE_ARN
            ECS_BACKEND_SERVICE
            ECS_FRONTEND_SERVICE
            ECR_BACKEND_REPOSITORY
            ECR_FRONTEND_REPOSITORY
            BACKEND_FRONTEND_URL
            BACKEND_GOOGLE_CALLBACK_URL
            BACKEND_MONGO_URI_ARN
            BACKEND_JWT_SECRET_ARN
            BACKEND_GOOGLE_CLIENT_ID_ARN
            BACKEND_GOOGLE_CLIENT_SECRET_ARN
          )

          for name in "${required_vars[@]}"; do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing variable::$name is not set. Add it as a GitHub repository variable before deploying."
              exit 1
            fi
          done

      - name: Resolve backend runtime configuration
        id: backend-config
        run: |
          echo "cors_origins=${BACKEND_CORS_ORIGINS:-$BACKEND_FRONTEND_URL}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        id: aws-creds
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          mask-aws-account-id: true

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image URIs
        id: images
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
        run: |
          echo "backend=${REGISTRY}/${ECR_BACKEND_REPOSITORY}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "frontend=${REGISTRY}/${ECR_FRONTEND_REPOSITORY}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.images.outputs.backend }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_BACKEND_REPOSITORY }}:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ steps.images.outputs.frontend }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_FRONTEND_REPOSITORY }}:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Prepare ECS task definition templates
        run: |
          cp infra/ecs/backend-task-definition.template.json backend-task-definition.json
          cp infra/ecs/frontend-task-definition.template.json frontend-task-definition.json

          sed -i "s|__AWS_REGION__|$AWS_REGION|g; s|__ECS_EXECUTION_ROLE_ARN__|$ECS_EXECUTION_ROLE_ARN|g" backend-task-definition.json
          sed -i "s|__AWS_REGION__|$AWS_REGION|g; s|__ECS_EXECUTION_ROLE_ARN__|$ECS_EXECUTION_ROLE_ARN|g" frontend-task-definition.json

      - name: Render backend task definition
        id: render-backend
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: backend-task-definition.json
          container-name: puppet-backend
          image: ${{ steps.images.outputs.backend }}
          environment-variables: |
            NODE_ENV=production
            PORT=4000
            FRONTEND_URL=${{ env.BACKEND_FRONTEND_URL }}
            CORS_ORIGINS=${{ steps.backend-config.outputs.cors_origins }}
            GOOGLE_CALLBACK_URL=${{ env.BACKEND_GOOGLE_CALLBACK_URL }}
          secrets: |
            MONGO_URI=${{ env.BACKEND_MONGO_URI_ARN }}
            JWT_SECRET=${{ env.BACKEND_JWT_SECRET_ARN }}
            GOOGLE_CLIENT_ID=${{ env.BACKEND_GOOGLE_CLIENT_ID_ARN }}
            GOOGLE_CLIENT_SECRET=${{ env.BACKEND_GOOGLE_CLIENT_SECRET_ARN }}

      - name: Deploy backend service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-backend.outputs.task-definition }}
          service: ${{ env.ECS_BACKEND_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-max-delay-seconds: 15
          enable-ecs-managed-tags: true

      - name: Render frontend task definition
        id: render-frontend
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: frontend-task-definition.json
          container-name: puppet-frontend
          image: ${{ steps.images.outputs.frontend }}

      - name: Deploy frontend service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-frontend.outputs.task-definition }}
          service: ${{ env.ECS_FRONTEND_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-max-delay-seconds: 15
          enable-ecs-managed-tags: true
